name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-angular:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build -- --configuration production --base-href ./

      - name: Upload Angular build
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dist/frontend/browser/
          if-no-files-found: error

  build-electron:
    needs: build-angular
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            command: npx electron-builder --linux AppImage deb --publish never
          - os: windows-latest
            platform: windows
            command: npx electron-builder --win nsis --publish never
          - os: macos-latest
            platform: mac
            command: npx electron-builder --mac dmg --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Angular build
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: dist/frontend/browser/

      - name: Build Electron
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nikode-${{ matrix.platform }}
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.exe
            dist-electron/*.dmg
          if-no-files-found: error

  build-pacman:
    needs: build-angular
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git nodejs npm base-devel libxcrypt-compat

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm ci

      - name: Download Angular build
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: dist/frontend/browser/

      - name: Build Electron (pacman)
        run: npx electron-builder --linux pacman --publish never

      - name: Upload pacman artifact
        uses: actions/upload-artifact@v4
        with:
          name: nikode-pacman
          path: dist-electron/*.pacman
          if-no-files-found: error

  release:
    needs: [build-electron, build-pacman]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nikode-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
